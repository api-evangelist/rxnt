name: RXNT
kind: company
description: RXNT is a cloud-based, integrated healthcare software company offering
  ONC-certified Electronic Health Records (EHR), EPCS-enabled electronic prescribing
  (eRx), practice management, medical billing, scheduling, and a patient portal for
  outpatient practices. Most of the RXNT platform is delivered as SaaS with no
  broadly published developer API - product integrations (labs, radiology, billing
  clearinghouses) are arranged privately with partners. The one documented, publicly
  described API is the RXNT Clinical Data API (CDAPI), an ONC-mandated interface that
  lets registered third-party applications retrieve a patient's Common Clinical Data
  Set (CCDS). Access to the CDAPI is gated - third parties must register with RXNT
  (support@rxnt.com) to receive credentials before calling it.
