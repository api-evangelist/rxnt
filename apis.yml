  - url: https://github.com/RXNT/RxNTClinicalDataAPI
    type: Documentation
  - url: https://github.com/RXNT/RxNTClinicalDataAPI
    type: APIReference
  - url: openapi/rxnt-openapi.yml
    type: OpenAPI
  description: ONC-certified interface (45 CFR 170.315(g)(7), (g)(8), and (g)(9))
    that lets registered third-party applications and patient representatives
    retrieve a patient's Common Clinical Data Set (CCDS) - demographics, problems,
    medications, allergies, vital signs, lab results, immunizations, procedures,
    care team, goals, health concerns, and implantable device identifiers.
    Callers authenticate with RXNT-issued credentials to obtain a time-limited
    token and signature, then request patient data (by category or in full) that
    is returned as CCDS XML embedded in a JSON envelope. Access is partner-gated -
    third parties must first register with RXNT (support@rxnt.com). The reference
    repository has been archived read-only since December 2021.
